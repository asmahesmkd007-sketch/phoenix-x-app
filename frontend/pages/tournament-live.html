<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tournament Arena – PHOENIX X</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    .arena-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      height: 100%;
      min-height: 80vh;
    }

    .leaderboard-panel {
      width: 320px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
    }

    .leaderboard-list {
      flex: 1;
      overflow-y: auto;
      margin-top: 12px;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-row.me {
      background: rgba(91, 192, 235, 0.06);
      border-radius: 8px;
      padding: 10px 8px;
    }

    .rank-num {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      width: 24px;
      text-align: center;
    }

    .game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
      min-height: 400px;
    }

    .status-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      border-radius: 12px;
    }

    .status-overlay.hidden {
      display: none;
    }

    .countdown-timer {
      font-family: var(--font-display);
      font-size: 36px;
      color: #5bc0eb;
      font-weight: 700;
    }

    .player-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 500px;
    }

    .player-bar.active {
      border-color: #5bc0eb;
      background: rgba(91, 192, 235, 0.06);
    }

    .player-timer {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: #5bc0eb;
      margin-left: auto;
    }

    .player-timer.low {
      color: var(--error);
      animation: pulse-red 1s infinite;
    }

    #board {
      width: min(500px, 100%);
      margin: 16px 0;
      border: 4px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* Premium Board Theme (Lichess/Chess.com Green) */
    .paid-tr-arena .white-1e1d7 {
      background-color: #ebecd0 !important;
      color: #779556 !important;
    }

    .paid-tr-arena .black-3c85d {
      background-color: #779556 !important;
      color: #ebecd0 !important;
    }

    .highlight-selected {
      background-color: rgba(115, 45, 30, 0.7) !important; /* Dark Brown like screenshot */
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .highlight-move {
      position: relative;
    }

    /* The Dot Style - Small Gray Circle */
    .highlight-move::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24%;
      height: 24%;
      background: rgba(0, 0, 0, 0.3) !important;
      border-radius: 50%;
      z-index: 15;
      pointer-events: none;
    }

    /* Promotion Dialog Styles */
    .promotion-dialog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      z-index: 2000;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .promotion-dialog.hidden { display: none; }
    .promotion-pieces {
      display: flex;
      gap: 20px;
    }
    .promotion-piece {
      font-size: 44px;
      cursor: pointer;
      color: white;
      transition: transform 0.2s, color 0.2s;
    }
    .promotion-piece:hover {
      transform: scale(1.3);
      color: #5bc0eb;
    }
    .promotion-title {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Capture Indicator (Ring) */
    .highlight-capture {
      position: relative;
    }
    .highlight-capture::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      height: 85%;
      border: 5px solid rgba(0, 0, 0, 0.45) !important;
      border-radius: 50%;
      z-index: 15;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <div class="page-title" id="tournament-name">TOURNAMENT ARENA</div>
          <div class="live-badge">
            <div class="live-dot"></div> LIVE
          </div>
        </div>
        <div class="topbar-right" style="gap:8px">
          <div class="topbar-player-id" id="tb-pid">...</div>
        </div>
      </div>

      <div class="page-content" id="arena-content" style="height: calc(100vh - 100px); padding-bottom: 20px;">
        <div class="arena-layout">

          <!-- SIDE LEADERBOARD PIP -->
          <div class="leaderboard-panel">
            <div style="text-align: center; margin-bottom: 16px;">
              <div style="font-size: 11px; letter-spacing: 1px; color: var(--text-muted);">TIME REMAINING</div>
              <div class="countdown-timer" id="global-timer">--:--</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom: 8px; border-bottom: 1px solid var(--border);">
              <div style="font-weight: 600;">Leaderboard</div>
              <div id="round-label" style="font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase;">ROUND --</div>
            </div>
            <div class="leaderboard-list" id="leaderboard">
              <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">Loading...</div>
            </div>
          </div>

          <!-- MAIN GAME AREA -->
          <div class="game-panel">

            <!-- ACTIVE GAME UI (Always Visible now) -->
            <div id="game-arena" style="width:100%; max-width:500px; display:flex; flex-direction:column; align-items:center; position:relative;">
              
              <!-- LOBBY / SEARCH OVERLAY (Now a floating banner) -->
              <div class="status-overlay" id="lobby-status" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);">
                <div id="status-icon" style="font-size: 40px; margin-bottom: 10px;"><i class="fa-solid fa-gamepad"></i></div>
                <h2 id="status-title" style="margin-bottom: 4px; font-size: 18px;">Entering Arena...</h2>
                <div id="status-desc" style="color: var(--text-secondary); max-width: 260px; margin-bottom: 15px; font-size: 13px;">Please wait while we set up your match.</div>
                <div class="spinner" id="search-spinner" style="display:none; width:25px; height:25px; border-width: 3px; margin: 0 auto; margin-bottom:15px;"></div>
                <button class="btn btn-primary btn-sm" id="action-btn" style="display:none;">Find Match</button>
              </div>

              <div class="player-bar" id="opponent-bar" style="opacity: 0.5;">
                <div class="avatar-initial" id="opp-avatar">?</div>
                <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="font-weight:600" id="opp-name">Opponent</div>
                    <div style="font-size:11px;color:var(--text-muted)" id="opp-rating">Waiting...</div>
                  </div>
                  <div id="opp-captured" style="display:flex;align-items:center;margin-top:2px;font-size:14px;color:var(--text-secondary);min-height:16px"></div>
                </div>
                <div class="player-timer" id="opp-timer">0:00</div>
              </div>

              <!-- Chess Board (Always Visible) -->
              <div id="board"></div>

              <!-- Promotion Dialog -->
              <div id="promotion-dialog" class="promotion-dialog hidden">
                <div class="promotion-title">Select Promotion</div>
                <div class="promotion-pieces">
                  <div class="promotion-piece" data-piece="q">♛</div>
                  <div class="promotion-piece" data-piece="r">♜</div>
                  <div class="promotion-piece" data-piece="b">♝</div>
                  <div class="promotion-piece" data-piece="n">♞</div>
                </div>
              </div>

              <div class="player-bar" id="my-bar" style="opacity: 0.5;">
                <div class="avatar-initial" id="my-avatar">P</div>
                <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="font-weight:600" id="my-name">You</div>
                    <div style="font-size:11px;color:var(--text-muted)" id="my-score">Points: 0</div>
                  </div>
                  <div id="my-captured" style="display:flex;align-items:center;margin-top:2px;font-size:14px;color:var(--text-secondary);min-height:16px"></div>
                </div>
                <div class="player-timer" id="my-timer">0:00</div>
              </div>

              <button class="btn btn-danger btn-sm" id="resign-btn" style="margin-top:20px; align-self:flex-start; display:none;" onclick="resignGame()"><i class="fa-solid fa-flag"></i> Resign Match</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROMOTION MODAL -->
  <div id="promotion-modal" class="promotion-modal">
    <div class="promotion-content">
      <div class="promotion-title">Select Promotion Piece</div>
      <div class="promotion-options" id="promotion-options"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script>
    if (!requireAuth()) throw new Error();
    const user = getUser();
    loadSidebar();

    document.getElementById('tb-pid').textContent = user.player_id;
    document.getElementById('my-name').textContent = fmt.username(user.username);
    document.getElementById('my-avatar').textContent = user.username.replace('@', '')[0].toUpperCase();

    const params = new URLSearchParams(window.location.search);
    const tournamentId = params.get('id');
    if (!tournamentId) window.location.href = '/pages/free-tournament.html';

    let tournamentConfig = null;
    let globalCountdownInterval = null;

    let chess = new Chess();
    let board = null;
    let gameActive = false;
    let matchId = null;
    let myColor = 'white';
    let matchTimerType = 5;
    let myTime = 5 * 60;
    let oppTime = 5 * 60;
    let timerInterval = null;
    let selectedSquare = null;

    const sock = initSocket();

    async function initTournament() {
      const res = await TournamentAPI.getById(tournamentId);
      if (!res?.success) return window.location.href = '/pages/free-tournament.html';

      sock.emit('join_tournament', { tournamentId });

      tournamentConfig = res.tournament;

      // Initialize Empty Board immediately
      if (!board) {
        if (tournamentConfig.type === 'paid') {
           document.getElementById('arena-content').classList.add('paid-tr-arena');
        }

        board = Chessboard('board', {
          draggable: true,
          position: 'start',
          pieceTheme: 'https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/alpha/{piece}.png',
          onDragStart: onDragStart,
          onDrop: onDrop,
          onSnapEnd: () => {
            board.position(chess.fen());
            removeGreySquares();
          }
        });

        // Click handler for move dots
        $('#board').on('click', '.square-55d63', function() {
            const square = $(this).attr('data-square');
            const p = chess.get(square);
            onSquareClick(square, p ? (p.color + p.type.toUpperCase()) : null);
        });
      }
      document.getElementById('tournament-name').textContent = tournamentConfig.name.toUpperCase();
      matchTimerType = tournamentConfig.timer_type;

      if (tournamentConfig.status === 'completed' || tournamentConfig.status === 'cancelled') {
        refreshLeaderboard();
        return;
      }

      if (tournamentConfig.status === 'upcoming') {
          startGlobalTimer();
      }
      refreshLeaderboard();

      if (tournamentConfig.type === 'paid') {
        setupPaidTournamentLobby();
      } else {
        startSearching(); 
      }
    }

    function setupPaidTournamentLobby() {
        const storedMatch = localStorage.getItem(`px_active_match_${tournamentId}`);
        if (storedMatch) {
             sock.emit('rejoin_tr_match', { matchId: storedMatch, userId: user.id });
        } else {
             showLobby('Lobby Waiting Area', 'Tournament starts automatically when full.', false, false);
        }

        sock.on('connect', () => {
             console.log('🔄 Socket Reconnected. Checking for active matches...');
             const storedMatch = localStorage.getItem(`px_active_match_${tournamentId}`);
             if (storedMatch && user) {
                  sock.emit('rejoin_tr_match', { matchId: storedMatch, userId: user.id });
             }
        });

        sock.on(`tournament_sync_${tournamentId}`, (data) => {
             state = data; // Update global state
             
             // Update Global Panel Timer
             document.getElementById('global-timer').textContent = fmt.countdown(state.countdown);
             
             // Update Leaderboard
             renderLeaderboard(state.players);

             if (state.status === 'full') {
                  showLobby('Tournament Locked', 'All players joined. Starting soon!', true, false);
                  document.getElementById('status-title').innerHTML = `STARTING IN: <span style="color:var(--gold)">${fmt.countdown(state.countdown)}</span>`;
             } else if (state.status === 'starting') {
                  showLobby('Generating Brackets', 'Round 1 starting...', true, false);
                  document.getElementById('status-title').innerHTML = `STARTING: <span style="color:var(--gold)">${fmt.countdown(state.countdown)}</span>`;
             } else if (state.status === 'live') {
                  const roundLabel = `ROUND ${state.round}`;
                  if (!gameActive) showLobby(`${roundLabel} In Progress`, 'Tournament is live!', true, false);

                  // Match Detection
                  if (state.matches && state.matches.length > 0) {
                      const myMatch = state.matches.find(m => m.player1.userId === user.id || m.player2.userId === user.id);
                      if (myMatch) {
                          if ((myMatch.status === 'live' || myMatch.status === 'waiting_connect') && !gameActive) {
                              const color = myMatch.player1.userId === user.id ? 'white' : 'black';
                              const oppData = color === 'white' ? state.players.find(p => p.user_id === myMatch.player2.userId) : state.players.find(p => p.user_id === myMatch.player1.userId);
                              matchId = myMatch.id;
                              localStorage.setItem(`px_active_match_${tournamentId}`, matchId);
                              
                              const mTime = color === 'white' ? myMatch.player1.time : myMatch.player2.time;
                              const oTime = color === 'white' ? myMatch.player2.time : myMatch.player1.time;
                              setupGame(color, oppData, myMatch.fen || 'start', mTime, oTime);
                          } else if (myMatch.status === 'finished' && gameActive) {
                              // Match ended on server, but we are still in game mode. Force exit.
                              gameActive = false;
                              clearInterval(timerInterval);
                              localStorage.removeItem(`px_active_match_${tournamentId}`);
                              showLobby('Match Over', 'Match concluded. Updating leaderboard...', false, false);
                              setTimeout(() => refreshLeaderboard(), 2000);
                          }
                      }
                  }
             } else if (state.status === 'rest') {
                  showLobby('Round Complete', `Next round in ${state.countdown}s`, false, false);
                  refreshLeaderboard();
             } else if (state.status === 'completed') {
                  if (globalCountdownInterval) clearInterval(globalCountdownInterval);
                  showLobby('Tournament Ended', 'All rounds completed!', false);
                  setTimeout(()=> refreshLeaderboard(), 2000);
             }
        });
        
        sock.on('match_found_tr', (data) => {
             matchId = data.matchId;
             localStorage.setItem(`px_active_match_${tournamentId}`, matchId);
             setupGame(data.color, data.opponent);
        });

        sock.on('match_rejoined', (data) => {
             matchId = data.roomId.replace('tr_', '');
             const color = data.color;
             const mTime = color === 'white' ? data.white_time : data.black_time;
             const oTime = color === 'white' ? data.black_time : data.white_time;
             setupGame(color, data.opponent, data.fen, mTime, oTime);
        });

        sock.on('tr_timer', (data) => {
             const timeStr = fmt.countdown(data.countdown);
             document.getElementById('global-timer').textContent = timeStr;
             
             const statusTitle = document.getElementById('status-title');
             if (statusTitle.innerHTML.includes('STARTING IN')) {
                  statusTitle.innerHTML = `STARTING IN: <span style="color:var(--gold)">${timeStr}</span>`;
             } else if (statusTitle.innerHTML.includes('In Progress')) {
                  // Optional: Update board overlay with tournament time too? 
                  // For now keep it clean
             }
        });

        sock.on('tournament_eliminated', () => {
             localStorage.removeItem(`px_active_match_${tournamentId}`);
             showLobby('Eliminated 😔', 'You were knocked out. Redirecting to dashboard...', false, false);
             setTimeout(() => {
                  window.location.href = '/pages/dashboard.html';
             }, 3000);
        });
    }

    function startGlobalTimer() {
      if (globalCountdownInterval) clearInterval(globalCountdownInterval);
      const end = new Date(tournamentConfig.end_time).getTime();

      globalCountdownInterval = setInterval(() => {
        const diff = Math.max(0, Math.floor((end - Date.now()) / 1000));
        document.getElementById('global-timer').textContent = fmt.countdown(diff);
      }, 1000);
    }

    function renderLeaderboard(players) {
      if (!players || !Array.isArray(players) || !user) return;
      
      const myP = players.find(p => (p.user_id?.id || p.user_id) === user.id);
      if (myP) {
        document.getElementById('my-score').textContent = `Rank: ${myP.rank || '--'}`;
      }

      if (tournamentConfig && tournamentConfig.round) {
          document.getElementById('round-label').textContent = `ROUND ${tournamentConfig.round}`;
      }

      const tourneyStatus = tournamentConfig?.status || 'live';
      const isCompleted = tourneyStatus === 'completed';
      const sorted = [...players]
        .sort((a, b) => {
            if (a.status === 'eliminated' && b.status !== 'eliminated' && !isCompleted) return 1;
            if (a.status !== 'eliminated' && b.status === 'eliminated' && !isCompleted) return -1;
            return (b.score || 0) - (a.score || 0);
        });

      const html = sorted.map((p, i) => {
        const name = p.username || p.profiles?.username || 'Player';
        const isMe = (p.user_id?.id || p.user_id) === user.id;
        const isEliminated = p.status === 'eliminated';
        
        let statusText = isEliminated ? 'ELIMINATED' : 'ACTIVE';
        let statusColor = isEliminated ? '#ff4d4d' : '#5bc0eb';

        if (isCompleted) {
            const is32Player = tournamentConfig?.max_players === 32;
            if (i === 0) { statusText = '1st WINNER 🏆'; statusColor = '#ffd700'; }
            else if (i === 1) { statusText = '2nd WINNER 🥈'; statusColor = '#c0c0c0'; }
            else if (i === 2) { statusText = '3rd WINNER 🥉'; statusColor = '#cd7f32'; }
            else if (is32Player && i < 6) { statusText = `${i + 1}th WINNER 🎖️`; statusColor = '#5bc0eb'; }
            else { statusText = 'ELIMINATED'; statusColor = '#ff4d4d'; }
        }

        const initial = (name && name.length > 0) ? name.replace('@', '')[0].toUpperCase() : '?';

        return `
          <div class="leaderboard-row ${isMe ? 'me' : ''} ${isEliminated ? 'eliminated' : ''}">
            <div class="rank-num">${i + 1}</div>
            <div class="avatar-initial" style="width:28px;height:28px;font-size:11px; ${(isEliminated && !isCompleted) ? 'opacity:0.5' : ''}">${initial}</div>
            <div style="flex:1; ${(isEliminated && !isCompleted) ? 'opacity:0.5' : ''}">
              <div style="font-size:13px;font-weight:500">${name}</div>
              <div style="font-family:var(--font-display);font-size:11px;color:${statusColor}">${statusText}</div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('leaderboard').innerHTML = html || '<div style="padding:20px;text-align:center;font-size:12px;color:gray">No players yet.</div>';
    }

    async function refreshLeaderboard() {
      const res = await TournamentAPI.getById(tournamentId);
      if (res?.success) {
        tournamentConfig = res.tournament;
        renderLeaderboard(res.tournament.players || []);
      }
    }

    function showLobby(title, desc, showSearch = false, showBtn = false, btnText = 'Find Match', btnAction = startSearching) {
      const overlay = document.getElementById('lobby-status');
      overlay.classList.remove('hidden');
      document.getElementById('status-title').textContent = title;
      document.getElementById('status-desc').textContent = desc;
      document.getElementById('search-spinner').style.display = showSearch ? 'block' : 'none';
      const btn = document.getElementById('action-btn');
      btn.style.display = showBtn ? 'inline-flex' : 'none';
      if (showBtn) { btn.textContent = btnText; btn.onclick = btnAction; }
    }

    function startSearching() {
      showLobby('Searching for Match...', 'Looking for an opponent...', true, true, 'Cancel Search', cancelSearch);
      SocketActions.findTournamentMatch(tournamentId, matchTimerType, user.id, user.username);
    }

    function cancelSearch() {
      SocketActions.cancelTournamentSearch(tournamentId, user.id);
      showLobby('Ready to Play', 'Join the queue to find an opponent.', false, true, 'Find Match', startSearching);
    }

    function setupGame(color, opponent, fen = 'start', startTime = null, startOppTime = null) {
      gameActive = true;
      myColor = color;
      myTime = startTime !== null ? startTime : (matchTimerType * 60);
      oppTime = startOppTime !== null ? startOppTime : (matchTimerType * 60);
      chess = new Chess();
      if (fen !== 'start') chess.load(fen);

      document.getElementById('opp-name').textContent = fmt.username(opponent.username);
      document.getElementById('opp-avatar').textContent = opponent.username.replace('@', '')[0].toUpperCase();
      document.getElementById('opp-rating').textContent = 'Live Knockout Match';

      document.getElementById('lobby-status').classList.add('hidden');
      document.getElementById('my-bar').style.opacity = '1';
      document.getElementById('opponent-bar').style.opacity = '1';
      document.getElementById('resign-btn').style.display = 'inline-flex';

      if (!board) {
        board = Chessboard('board', {
          draggable: true,
          position: fen,
          orientation: myColor,
          pieceTheme: 'https://raw.githubusercontent.com/oakmac/chessboardjs/master/website/img/chesspieces/alpha/{piece}.png',
          onDragStart: onDragStart,
          onDrop: onDrop,
          onDragStart: onDragStart,
          onDrop: onDrop,
          onSnapEnd: () => {
            board.position(chess.fen());
            removeGreySquares();
          }
        });

        // Click handler for move dots
        $('#board').on('click', '.square-55d63', function() {
            const square = $(this).attr('data-square');
            const p = chess.get(square);
            onSquareClick(square, p ? (p.color + p.type.toUpperCase()) : null);
        });
      } else {
        board.orientation(myColor);
        board.position(chess.fen());
        // board.start() removed - it incorrectly resets position to 'start'
      }

      startMatchTimer();
      updatePlayerBars();
    }

    function onDragStart(source, piece) {
      if (!gameActive || chess.game_over()) return false;
      const turn = chess.turn() === 'w' ? 'white' : 'black';
      if (turn !== myColor) return false;
      if (piece.charAt(0) !== (myColor === 'white' ? 'w' : 'b')) return false;
      
      // Highlight moves on drag start
      onMouseoverSquare(source, piece);
    }

    function onDrop(source, target) {
      removeGreySquares();

      // Check for promotion
      if (isPromotionMove(source, target)) {
          handlePromotion(source, target);
          return 'snapback'; // snapped back while waiting for selection
      }

      const move = chess.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';
      SocketActions.makeTrMove(matchId, move, user.id);
      updatePlayerBars();
    }

    function removeGreySquares() {
      $('#board .square-55d63').removeClass('highlight-move highlight-capture highlight-selected');
    }

    function greySquare(square, isCapture = false) {
      const $square = $('#board .square-' + square);
      if (isCapture) {
        $square.addClass('highlight-capture');
      } else {
        $square.addClass('highlight-move');
      }
    }

    function onSquareClick(square, piece) {
      if (!gameActive) return;

      const isTarget = $('#board .square-' + square).hasClass('highlight-move') || $('#board .square-' + square).hasClass('highlight-capture');

      // 1. If we have a selection and click a target square -> MOVE
      if (selectedSquare && isTarget) {
          if (isPromotionMove(selectedSquare, square)) {
              handlePromotion(selectedSquare, square);
              return;
          }

          const move = chess.move({
              from: selectedSquare,
              to: square,
              promotion: 'q'
          });

          if (move) {
              board.position(chess.fen());
              removeGreySquares();
              selectedSquare = null;
              SocketActions.makeTrMove(matchId, move, user.id);
              updatePlayerBars();
              return;
          }
      }

      // 2. Clear selection if clicking same square or invalid square
      if (selectedSquare === square || (!piece && !isTarget)) {
          removeGreySquares();
          selectedSquare = null;
          return;
      }

      // 3. Select our piece
      if (piece) {
          const turn = chess.turn() === 'w' ? 'white' : 'black';
          const isMyPiece = piece.charAt(0) === (myColor === 'white' ? 'w' : 'b');

          if (turn === myColor && isMyPiece) {
              removeGreySquares();
              selectedSquare = square;
              $('#board .square-' + square).addClass('highlight-selected');
              
              const moves = chess.moves({ square: square, verbose: true });
              if (moves.length === 0) return;

              for (let i = 0; i < moves.length; i++) {
                greySquare(moves[i].to, moves[i].flags.includes('c'));
              }
              return;
          }
      }

      // 4. Default: Clear
      removeGreySquares();
      selectedSquare = null;
    }

    let pendingPromotion = null;

    function isPromotionMove(source, target) {
      const p = chess.get(source);
      if (!p || p.type !== 'p') return false;
      if (p.color === 'w' && target[1] !== '8') return false;
      if (p.color === 'b' && target[1] !== '1') return false;
      
      const moves = chess.moves({ square: source, verbose: true });
      return moves.some(m => m.to === target && m.flags.includes('p'));
    }

    function handlePromotion(source, target) {
      pendingPromotion = { from: source, to: target };
      const dialog = document.getElementById('promotion-dialog');
      dialog.classList.remove('hidden');
      
      if (!dialog.dataset.bound) {
        dialog.querySelectorAll('.promotion-piece').forEach(p => {
          p.onclick = () => {
            executePromotion(p.dataset.piece);
          };
        });
        dialog.dataset.bound = "true";
      }
    }

    function executePromotion(piece) {
      if (!pendingPromotion) return;
      
      const move = chess.move({
        from: pendingPromotion.from,
        to: pendingPromotion.to,
        promotion: piece
      });

      if (move) {
        board.position(chess.fen());
        removeGreySquares();
        selectedSquare = null;
        SocketActions.makeTrMove(matchId, move, user.id);
        updatePlayerBars();
      }
      
      document.getElementById('promotion-dialog').classList.add('hidden');
      pendingPromotion = null;
    }

    function onMouseoverSquare(square, piece) {
      // Disabled in favor of click
    }

    function onMouseoutSquare(square, piece) {
      // Disabled in favor of click
    }

    function updatePlayerBars() {
      const turn = chess.turn() === (myColor === 'white' ? 'w' : 'b');
      document.getElementById('my-bar').classList.toggle('active', turn);
      document.getElementById('opponent-bar').classList.toggle('active', !turn);
    }

    function startMatchTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!gameActive) return;
        if (chess.turn() === (myColor === 'white' ? 'w' : 'b')) {
          myTime--;
          document.getElementById('my-timer').textContent = fmt.countdown(myTime);
        } else {
          oppTime--;
          document.getElementById('opp-timer').textContent = fmt.countdown(Math.max(0, oppTime));
        }
      }, 1000);
    }

    function resignGame() {
      if (confirm('Resign match?')) SocketActions.resign(matchId, user.id);
    }

    sock.on('move_made', (data) => {
      if (data.fen) { chess.load(data.fen); board.position(data.fen); updatePlayerBars(); }
    });
    sock.on('timer_update', (data) => {
      myTime = myColor === 'white' ? data.white_time : data.black_time;
      oppTime = myColor === 'white' ? data.black_time : data.white_time;
      document.getElementById('my-timer').textContent = fmt.countdown(myTime);
      document.getElementById('opp-timer').textContent = fmt.countdown(Math.max(0, oppTime));
    });
    sock.on('game_over', (data) => {
      gameActive = false;
      clearInterval(timerInterval);
      localStorage.removeItem(`px_active_match_${tournamentId}`);
      
      const won = data.winnerId === user.id;
      const isDraw = data.result === 'draw';
      
      // 🏆 DISPLAY HYBRID SCORES
      const myPoints = myColor === 'white' ? data.p1_score : data.p2_score;
      const oppPoints = myColor === 'white' ? data.p2_score : data.p1_score;

      let msg = isDraw ? `Match Drawn. Points: ${myPoints}` : (won ? `You Won! Points: ${myPoints} vs ${oppPoints}` : `You Lost. Points: ${myPoints} vs ${oppPoints}`);
      
      if (data.reason === 'cheat_detected' && won) {
         msg = "Opponent Banned! You Won!";
      }
      
      document.getElementById('my-score').textContent = `Points: ${myPoints}`;
      
      // Automatic Redirection for Losers (especially on timeout as requested)
      if (!won && !isDraw && tournamentConfig?.type === 'paid') {
          const statusTitle = 'ELIMINATED 😔';
          const statusDesc = data.reason === 'timeout' 
            ? 'You ran out of time! Returning to dashboard...' 
            : 'You have been eliminated from the tournament. Returning to dashboard...';
          
          showLobby(statusTitle, statusDesc, false, false);
          
          setTimeout(() => {
            window.location.href = '/pages/dashboard.html';
          }, 4000);
      } else {
          showLobby('Match Over', msg, false, false);
      }

      setTimeout(() => {
        refreshLeaderboard();
      }, 3000);
    });

    initTournament();
  </script>
</body>

</html>
