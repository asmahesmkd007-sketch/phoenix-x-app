<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback – PHOENIX X</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .feedback-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      animation: fadeUp 0.5s ease-out;
    }
    .feedback-title {
      font-size: 24px;
      font-family: var(--font-display);
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .feedback-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    
    /* Star Rating */
    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 24px;
    }
    .star-rating input {
      display: none;
    }
    .star-rating label {
      font-size: 32px;
      color: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: color 0.2s, transform 0.2s;
    }
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
      color: var(--gold);
    }
    .star-rating label:hover {
      transform: scale(1.1);
    }
    
    /* Form Inputs */
    .feedback-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      margin-bottom: 16px;
      transition: border-color 0.2s, background 0.2s;
    }
    .feedback-input:focus {
      outline: none;
      border-color: var(--orange);
      background: rgba(255, 107, 53, 0.05);
    }
    textarea.feedback-input {
      resize: vertical;
      min-height: 120px;
    }
    
    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
    }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .status-msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .status-success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><div class="page-title">FEEDBACK</div></div>
      <div class="topbar-right">
        <div class="topbar-avatar" id="tb-avatar" onclick="window.location='/pages/account.html'" style="cursor:pointer">P</div>
      </div>
    </div>
    <div class="page-content" style="max-width:680px">
      
      <div class="feedback-card">
        <h2 class="feedback-title">Send Us Your Feedback</h2>
        <p class="feedback-subtitle">We value your thoughts! Let us know how we can improve your experience.</p>
        
        <form id="feedback-form">
          <label style="display:block; margin-bottom:8px; font-size:14px; color:var(--text-secondary)">How would you rate your experience?</label>
          <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5" checked><label for="star5" title="5 stars"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="4 stars"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="3 stars"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="2 stars"><i class="fa-solid fa-star"></i></label>
            <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="1 star"><i class="fa-solid fa-star"></i></label>
          </div>
          
          <input type="text" id="fb-name" name="name" class="feedback-input" placeholder="Your Name (Optional)">
          <input type="email" id="fb-email" name="email" class="feedback-input" placeholder="Your Email Address" required>
          <textarea id="fb-message" name="message" class="feedback-input" placeholder="Type your message here..." required></textarea>
          
          <button type="submit" id="fb-submit" class="btn btn-primary btn-submit">
            <span>Send Feedback</span>
          </button>
          
          <div id="fb-status" class="status-msg"></div>
        </form>
      </div>
      
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/socket.js"></script>
<script>
if (!requireAuth()) throw new Error();
const user = getUser();
loadSidebar();
initSocket();
if (user.profile_image) {
  document.getElementById('tb-avatar').innerHTML = `<img src="${user.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
} else {
  document.getElementById('tb-avatar').textContent = (user.username || 'P').replace('@', '')[0].toUpperCase();
}

// Pre-fill email and name if available
document.getElementById('fb-email').value = user.email || '';
document.getElementById('fb-name').value = user.username ? user.username.replace('@', '') : '';



document.getElementById('feedback-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const submitBtn = document.getElementById('fb-submit');
  const statusMsg = document.getElementById('fb-status');
  
  // Get rating value
  const rating = document.querySelector('input[name="rating"]:checked').value;
  const name = document.getElementById('fb-name').value;
  const email = document.getElementById('fb-email').value;
  const message = document.getElementById('fb-message').value;

  // UI Loading State
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block"></div><span>Sending...</span>';
  statusMsg.style.display = 'none';
  statusMsg.className = 'status-msg';

  try {
    // Send feedback to backend (which saves to DB and emails Admin)
    const res = await UserAPI.submitFeedback({ rating, name, email, message });
    if (!res.success) throw new Error(res.message);

    // Show Success UI
    statusMsg.textContent = "Thank you! Your feedback has been sent successfully.";
    statusMsg.classList.add('status-success');
    statusMsg.style.display = 'block';
    
    // Reset form selectively
    document.getElementById('fb-message').value = '';
    
  } catch (error) {
    console.error("EmailJS Error:", error);
    // Show Error UI
    statusMsg.textContent = "Oops! Something went wrong. Please try again later.";
    statusMsg.classList.add('status-error');
    statusMsg.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span>Send Feedback</span>';
  }
});
</script>
</body>
</html>
