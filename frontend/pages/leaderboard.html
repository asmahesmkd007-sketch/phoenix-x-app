<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard – PHOENIX X</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .top3-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; align-items: flex-end; }
    .top3-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; text-align: center; flex: 1; max-width: 180px; }
    .top3-card.first { order: 2; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.06); transform: translateY(-10px); }
    .top3-card.second { order: 1; border-color: rgba(192,192,192,0.3); }
    .top3-card.third { order: 3; border-color: rgba(205,127,50,0.3); }
    .top3-crown { font-size: 28px; margin-bottom: 8px; }
    .top3-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #000; margin: 0 auto 8px; }
    .top3-iq { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
    .search-bar { position: relative; margin-bottom: 20px; }
    .search-bar input { padding-left: 36px; }
    .search-bar::before { content: ""; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .lb-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 10px; transition: background 0.15s; }
    .lb-row:hover { background: var(--bg-card-hover); }
    .lb-row.me { background: rgba(91,192,235,0.06); border: 1px solid rgba(91,192,235,0.15); margin: 4px 0; }
    .lb-rank { font-family: var(--font-display); font-size: 16px; font-weight: 700; width: 36px; text-align: center; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><div class="page-title">LEADERBOARD</div></div>
      <div class="topbar-right">
        <div class="topbar-player-id" id="tb-pid">...</div>
        <div class="topbar-avatar" id="tb-avatar" onclick="window.location='/pages/account.html'" style="cursor:pointer">P</div>
      </div>
    </div>
    <div class="page-content">
      <!-- TOP 3 -->
      <div id="top3-section" class="top3-grid">
        <div class="top3-card second"><div class="top3-crown"><i class="fa-solid fa-medal" style="color:#c0c0c0;"></i></div><div class="top3-avatar" style="background:linear-gradient(135deg,#999,#c0c0c0)" id="t2-avatar">?</div><div style="font-weight:600;font-size:13px" id="t2-name">-</div><div class="top3-iq" style="color:#c0c0c0" id="t2-iq">-</div><div style="font-size:11px;color:var(--text-muted)">IQ Level</div></div>
        <div class="top3-card first"><div class="top3-crown"><i class="fa-solid fa-crown"></i></div><div class="top3-avatar" style="background:linear-gradient(135deg,#b8860b,var(--gold))" id="t1-avatar">?</div><div style="font-weight:700;font-size:14px" id="t1-name">-</div><div class="top3-iq" style="color:var(--gold)" id="t1-iq">-</div><div style="font-size:11px;color:var(--text-muted)">IQ Level</div></div>
        <div class="top3-card third"><div class="top3-crown"><i class="fa-solid fa-medal" style="color:#cd7f32;"></i></div><div class="top3-avatar" style="background:linear-gradient(135deg,#8B4513,#cd7f32)" id="t3-avatar">?</div><div style="font-weight:600;font-size:13px" id="t3-name">-</div><div class="top3-iq" style="color:#cd7f32" id="t3-iq">-</div><div style="font-size:11px;color:var(--text-muted)">IQ Level</div></div>
      </div>

      <div class="card">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;z-index:1"></i>
          <input type="text" class="input" placeholder="Search @username..." id="lb-search" oninput="searchLeaderboard(this.value)" style="padding-left:36px;position:relative">
        </div>
        <div id="lb-list">
          <div class="flex-center" style="padding:40px"><div class="spinner"></div></div>
        </div>
        <div style="text-align:center;margin-top:16px">
          <button class="btn btn-secondary" id="load-more-lb" onclick="loadMore()" style="display:none">Load More</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/socket.js"></script>
<script>
if (!requireAuth()) throw new Error();
const user = getUser();
loadSidebar();
initSocket();
document.getElementById('tb-pid').textContent = user.player_id;
if (user.profile_image) {
  document.getElementById('tb-avatar').innerHTML = `<img src="${user.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
} else {
  document.getElementById('tb-avatar').textContent = (user.username || 'P').replace('@', '')[0].toUpperCase();
}

let allPlayers = [];
let page = 1;

async function loadLeaderboard() {
  const res = await GameAPI.getLeaderboard(page);
  if (!res?.success) return;
  allPlayers = page === 1 ? res.leaderboard : [...allPlayers, ...res.leaderboard];

  // Top 3
  if (page === 1 && allPlayers.length >= 1) {
    ['t1','t2','t3'].forEach((id, i) => {
      const p = allPlayers[i];
      if (!p) return;
      const avatarEl = document.getElementById(id + '-avatar');
      if (p.profile_image) {
        avatarEl.innerHTML = `<img src="${p.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        avatarEl.textContent = (p.username || '?').replace('@', '')[0].toUpperCase();
      }
      document.getElementById(id + '-name').textContent = fmt.username(p.username);
      document.getElementById(id + '-iq').textContent = p.iq_level;
    });
  }

  renderList(allPlayers);
  document.getElementById('load-more-lb').style.display = res.pages > page ? 'inline-flex' : 'none';
}

function renderList(players) {
  const rankColors = ['rank-1','rank-2','rank-3'];
  const medals = ['<i class="fa-solid fa-medal" style="color:var(--gold);"></i>','<i class="fa-solid fa-medal" style="color:#c0c0c0;"></i>','<i class="fa-solid fa-medal" style="color:#cd7f32;"></i>'];
  document.getElementById('lb-list').innerHTML = players.map((p, i) => {
    const isMe = p.user_id === user.id || p.username === user.username;
    const avatarHtml = p.profile_image 
      ? `<img src="${p.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : (p.username || '?').replace('@', '')[0].toUpperCase();

    return `<div class="lb-row ${isMe ? 'me' : ''}">
      <div class="lb-rank ${rankColors[i] || ''}">${i < 3 ? medals[i] : p.rank}</div>
      <div class="avatar-initial" style="width:36px;height:36px;font-size:14px">${avatarHtml}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${fmt.username(p.username)}${isMe ? ' <span style="color:#5bc0eb;font-size:11px">(You)</span>' : ''}</div>
        <div style="font-size:11px;color:var(--text-muted)">${p.total_matches || 0} matches · ${p.win_rate || 0}% WR</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-display);font-size:16px;color:#5bc0eb">${p.iq_level}</div>
        <div style="font-size:10px;color:var(--text-muted)">IQ</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-display);font-size:14px;color:var(--success)">${p.wins || 0}</div>
        <div style="font-size:10px;color:var(--text-muted)">Wins</div>
      </div>
    </div>`;
  }).join('');
}

function searchLeaderboard(query) {
  if (!query) { renderList(allPlayers); return; }
  // Normalize search: add @ if not present
  let q = query.trim().toLowerCase();
  if (!q.startsWith('@')) q = '@' + q;
  renderList(allPlayers.filter(p => p.username.toLowerCase().includes(q)));
}

function loadMore() { page++; loadLeaderboard(); }
loadLeaderboard();
</script>
</body>
</html>
